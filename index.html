<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kontrola JPP — MOM</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d6304a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kontrola JPP">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 32px;
    }
    .login-logo {
      text-align: center;
    }
    .login-logo .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      background: var(--primary);
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .login-logo .logo-badge svg { width: 40px; height: 40px; fill: white; }
    .login-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--text-primary);
      margin: 0 0 4px;
    }
    .login-logo p {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0;
    }
    .login-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }
    .login-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--text-primary);
      margin: 0 0 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      padding: 12px 14px;
      box-sizing: border-box;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group input[type="password"] {
      letter-spacing: 6px;
      font-size: 20px;
    }
    .form-group input::placeholder { letter-spacing: 0; font-size: 14px; color: var(--text-secondary); }
    .btn-login {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-login:active { opacity: 0.85; transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; }
    .login-err {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      margin-top: 10px;
    }
    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .login-footer a { color: var(--text-secondary); }
    /* Config panel */
    .cfg-toggle {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: underline;
      font-family: 'DM Sans', sans-serif;
    }
    .cfg-panel {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 360px;
      display: none;
    }
    .cfg-panel.open { display: block; }
    .cfg-panel label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .cfg-row {
      display: flex;
      gap: 8px;
    }
    .cfg-row input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 8px 10px;
    }
    .cfg-row button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
  </style>
</head>
<body class="dark">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-badge">
        <!-- Bus icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm9 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM6 6h12v5H6V6z"/>
        </svg>
      </div>
      <h1>Kontrola JPP</h1>
      <p>Mestna občina Maribor — Sektor za komunalo in promet</p>
    </div>

    <div class="login-card">
      <h2>Prijava</h2>
      <div class="form-group">
        <label>Ime in priimek</label>
        <input type="text" id="inp-ime" placeholder="npr. Ana Novak" autocomplete="name" autocorrect="off" autocapitalize="words">
      </div>
      <div class="form-group">
        <label>PIN (4 mestni)</label>
        <input type="password" id="inp-pin" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">Prijava</button>
      <div class="login-err" id="login-err"></div>
    </div>

    <div class="login-footer">
      <button class="cfg-toggle" onclick="toggleCfg()">⚙ Nastavitve API</button>
    </div>

    <div class="cfg-panel" id="cfg-panel">
      <label>Google Apps Script URL</label>
      <div class="cfg-row">
        <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/...">
        <button onclick="saveCfg()">Shrani</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/sheets.js"></script>
  <script>
    // Pre-fill config
    document.getElementById('cfg-url').value = window.APP.CFG.sheetsUrl || '';

    // If already logged in → redirect
    window.APP.loadAuth();
    if (window.APP.STATE.kontrolor) {
      window.location.href = 'app.html';
    }

    // Enter key support
    document.getElementById('inp-pin').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function toggleCfg() {
      document.getElementById('cfg-panel').classList.toggle('open');
    }

    function saveCfg() {
      const url = document.getElementById('cfg-url').value.trim();
      window.APP.CFG.sheetsUrl = url;
      window.APP.toast('URL shranjen');
      document.getElementById('cfg-panel').classList.remove('open');
    }

    async function doLogin() {
      const ime = document.getElementById('inp-ime').value.trim();
      const pin = document.getElementById('inp-pin').value.trim();
      const errEl = document.getElementById('login-err');
      const btn = document.getElementById('btn-login');

      errEl.textContent = '';
      if (!ime) { errEl.textContent = 'Vnesi ime in priimek.'; return; }
      if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'PIN mora biti 4-mestna številka.'; return; }

      btn.disabled = true;
      btn.textContent = 'Prijavljam…';

      try {
        const r = await window.SHEETS.login(ime, pin);
        if (r.ok) {
          window.APP.saveAuth({ ime, pin });
          window.location.href = 'app.html';
        } else {
          errEl.textContent = r.msg || 'Napačno ime ali PIN.';
          btn.disabled = false;
          btn.textContent = 'Prijava';
        }
      } catch(e) {
        errEl.textContent = e.message || 'Napaka pri prijavi.';
        btn.disabled = false;
        btn.textContent = 'Prijava';
      }
    }
  </script>
</body>
</html>
